name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: shellcheck · syntax · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (error level)
        run: shellcheck --severity=error bin/*.sh lib/*.sh docker/*.sh test/*.sh

      - name: Bash syntax (bash -n)
        run: |
          for f in bin/*.sh lib/*.sh docker/*.sh test/*.sh; do
            echo "checking $f"; bash -n "$f"
          done

      - name: Helper unit tests
        run: bash test/run-tool.test.sh

  docker-core:
    name: build checkup-core image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validates the core Dockerfile and that the pinned tool downloads still
      # resolve. The checkup-dotnet overlay (~2 GB, .NET SDK) is built and tested
      # locally rather than in CI to keep runs fast.
      - name: Build checkup-core
        run: docker build -t checkup-core .

      - name: Smoke-test baked tools
        run: |
          docker run --rm --entrypoint sh checkup-core -c '
            set -e
            for t in gitleaks semgrep shellcheck yamllint hadolint scc git jq; do
              command -v "$t" >/dev/null || { echo "MISSING: $t"; exit 1; }
            done
            echo "all cross-stack tools present"
          '
