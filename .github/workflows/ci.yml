name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: shellcheck · syntax · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (error level)
        run: shellcheck --severity=error bin/*.sh lib/*.sh docker/*.sh test/*.sh

      - name: Bash syntax (bash -n)
        run: |
          for f in bin/*.sh lib/*.sh docker/*.sh test/*.sh; do
            echo "checking $f"; bash -n "$f"
          done

      - name: Helper unit tests
        run: bash test/run-tool.test.sh

      - name: Stack-detection tests
        run: bash test/detect.test.sh

      - name: Command-profile tests
        run: bash test/profile.test.sh

  docker-core:
    name: build checkup-core image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validates the core Dockerfile and that the pinned tool downloads still
      # resolve. The checkup-dotnet overlay (~2 GB, .NET SDK) is built and tested
      # locally rather than in CI to keep runs fast.
      - name: Build checkup-core
        run: docker build -t checkup-core .

      - name: Smoke-test baked tools
        run: |
          docker run --rm --entrypoint sh checkup-core -c '
            set -e
            for t in gitleaks semgrep lizard shellcheck yamllint hadolint scc git jq; do
              command -v "$t" >/dev/null || { echo "MISSING: $t"; exit 1; }
            done
            echo "all cross-stack tools present"
          '

      # Dogfood: checkup scans itself for secrets (pinned gitleaks from the image,
      # repo .gitleaks.toml allowlists the checksums). Fails the build on a hit.
      - name: Secret self-scan (gitleaks)
        run: |
          docker run --rm -v "$PWD:/src:ro" --entrypoint gitleaks checkup-core \
            dir --no-banner --config /src/.gitleaks.toml /src

  hygiene:
    name: hygiene (no internal references)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enforce the public-repo rule (AGENTS.md): no internal/client identifiers
      # in the tree. The denylist lives in the BANNED_TERMS repo variable, not in
      # git, so the public repo never lists the very names we're banning. Output
      # is filenames only — never echo a matched term into the public log.
      - name: No internal/client references
        env:
          BANNED: ${{ vars.BANNED_TERMS }}
        run: |
          if [ -z "$BANNED" ]; then
            echo "::warning::BANNED_TERMS variable not set — internal-reference gate is a no-op"
            exit 0
          fi
          if git grep -I -i -l -E "$BANNED" -- .; then
            echo "::error::internal/client reference found in the file(s) listed above"
            exit 1
          fi
          echo "no internal/client references"
