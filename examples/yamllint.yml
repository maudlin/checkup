# Example yamllint config for the checkup `yamllint` check.
#
# Copy to your project root as `.yamllint.yml`.
# checkup invokes: yamllint -f parsable .github/workflows/*.yml

extends: default

rules:
  line-length:
    max: 120
    level: warning
  truthy:
    # GitHub Actions uses `on:` as a workflow key — don't flag it as a
    # non-boolean truthy value.
    allowed-values: ["true", "false", "on", "off"]
    check-keys: true
  comments:
    min-spaces-from-content: 1
  # GitHub Actions workflows don't start with `---`.
  document-start: disable
